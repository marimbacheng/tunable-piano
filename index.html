<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover 讓 safe-area env() 生效;鎖縮放避免雙擊放大 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tunable Piano">
  <meta name="theme-color" content="#101015">
  <title>Tunable Piano</title>
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="manifest" href="manifest.json">
  <!-- 相對路徑;禁用絕對路徑以相容 GitHub Pages 子路徑 -->
  <link rel="stylesheet" href="css/style.css">
  <!-- Tone.js（開發期 CDN；M6 若離線再改自帶） -->
  <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
</head>
<body>
  <!-- 解鎖層：手勢內啟動 AudioContext -->
  <div id="unlock" class="overlay">
    <button id="unlock-btn" class="unlock-btn" type="button">點擊開始</button>
  </div>

  <!-- 橫向提示層：直向時蓋滿，橫向自動移除 -->
  <div id="rotate" class="overlay" hidden>
    <div class="rotate-msg">請將手機橫放<br><span class="rotate-icon">↻</span></div>
  </div>

  <!-- 主畫面容器（M1 起長內容） -->
  <main id="app" class="app" hidden>
    <!-- 控制列 -->
    <div class="controls">
      <!-- 節拍器（左上角） -->
      <div class="ctrl metro">
        <span class="ctrl-label">節拍器</span>
        <div class="metro-row">
          <button id="metro-toggle" class="metro-toggle" type="button" aria-label="啟停">▶</button>
          <div class="bpm">
            <button id="bpm-dec" class="stepper" type="button" aria-label="BPM 減">−</button>
            <input id="bpm-input" class="bpm-input" type="number" inputmode="numeric" min="20" max="400" step="1" value="120">
            <button id="bpm-inc" class="stepper" type="button" aria-label="BPM 加">＋</button>
            <span class="bpm-unit">BPM</span>
          </div>
          <div id="tap" class="tap">tap</div>
        </div>
        <div class="metro-row2">
          <div class="timesig">
            <button id="num-dec" class="stepper small" type="button" aria-label="分子減">−</button>
            <span id="ts-num" class="ts-num">4</span>
            <span class="ts-slash">/</span>
            <button id="den-cycle" class="den-cycle" type="button" aria-label="分母切換">4</button>
            <button id="num-inc" class="stepper small" type="button" aria-label="分子加">＋</button>
          </div>
          <div id="beat-dots" class="beat-dots"></div>
        </div>
      </div>

      <!-- A4 基準音 -->
      <div class="ctrl a4">
        <span class="ctrl-label">A4 基準</span>
        <div class="a4-row">
          <button id="a4-dec" class="stepper" type="button" aria-label="A4 減 1">−</button>
          <input id="a4-input" class="a4-input" type="number" inputmode="numeric"
                 min="415" max="445" step="1" value="440">
          <button id="a4-inc" class="stepper" type="button" aria-label="A4 加 1">＋</button>
          <span class="bpm-unit">Hz</span>
        </div>
        <div class="a4-presets">
          <button class="a4-preset" type="button" data-hz="415">415</button>
          <button class="a4-preset" type="button" data-hz="432">432</button>
          <button class="a4-preset" type="button" data-hz="440">440</button>
          <button class="a4-preset" type="button" data-hz="442">442</button>
        </div>
      </div>

      <!-- 可視白鍵數 -->
      <div class="ctrl keys">
        <span class="ctrl-label">琴鍵數（白鍵）</span>
        <div class="a4-row">
          <button id="keys-dec" class="stepper" type="button" aria-label="鍵數減">−</button>
          <span id="keys-display" class="keys-display">12</span>
          <button id="keys-inc" class="stepper" type="button" aria-label="鍵數加">＋</button>
        </div>
      </div>

      <!-- 八度切換 -->
      <div class="ctrl oct">
        <span class="ctrl-label">八度</span>
        <div class="a4-row">
          <button id="oct-dec" class="stepper" type="button" aria-label="低八度">◀</button>
          <span id="oct-display" class="keys-display">C4</span>
          <button id="oct-inc" class="stepper" type="button" aria-label="高八度">▶</button>
        </div>
      </div>

      <!-- 滑動換音域：按住琴鍵水平拖曳平移可視視窗（預設關） -->
      <div class="ctrl slide">
        <span class="ctrl-label">滑動換音域</span>
        <div class="a4-row">
          <button id="slide-toggle" class="chord-toggle" type="button">滑動</button>
        </div>
      </div>

      <!-- 首調（C4 鍵實際發出的音） -->
      <div class="ctrl transpose">
        <span class="ctrl-label">首調（C4＝）</span>
        <div class="a4-row">
          <button id="tr-dec" class="stepper" type="button" aria-label="降半音">−</button>
          <span id="tr-display" class="keys-display tr-display">0 C</span>
          <button id="tr-inc" class="stepper" type="button" aria-label="升半音">＋</button>
        </div>
      </div>

      <!-- 和弦模式 + 辨識顯示 -->
      <div class="ctrl chord">
        <span class="ctrl-label">和弦</span>
        <div class="a4-row">
          <button id="chord-toggle" class="chord-toggle" type="button">和弦</button>
          <span class="chord-quals">
            <button class="qual on" type="button" data-q="diatonic">順階</button>
            <button class="qual" type="button" data-q="maj">M</button>
            <button class="qual" type="button" data-q="min">m</button>
            <button class="qual" type="button" data-q="dim">dim</button>
            <button class="qual" type="button" data-q="maj7">M7</button>
            <button class="qual" type="button" data-q="dom7">7</button>
            <button class="qual" type="button" data-q="min7">m7</button>
            <button class="qual" type="button" data-q="hdim7">ø7</button>
          </span>
          <span id="chord-display" class="chord-display">—</span>
        </div>
      </div>

      <!-- 主題 -->
      <div class="ctrl theme">
        <span class="ctrl-label">主題</span>
        <div class="a4-row theme-row">
          <button class="swatch swatch-classic" type="button" data-theme="classic" aria-label="經典"></button>
          <button class="swatch swatch-gray" type="button" data-theme="gray" aria-label="深灰"></button>
          <button class="swatch swatch-pink" type="button" data-theme="pink" aria-label="粉紅"></button>
        </div>
      </div>
    </div>

    <!-- 上方卷軸：拖動可視視窗於 A1–C6 -->
    <div id="scrollbar" class="scrollbar">
      <div id="scroll-thumb" class="thumb"></div>
    </div>

    <!-- 鍵盤 -->
    <div id="keyboard" class="keyboard"></div>
  </main>

  <!-- 相對路徑；載入順序：Tone(head) → audio → keyboard → metronome → ui → main -->
  <script src="js/audio.js"></script>
  <script src="js/keyboard.js"></script>
  <script src="js/metronome.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
